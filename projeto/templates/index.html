<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Leituras</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-light">

  <div class="container py-4">
    <div class="text-center mb-4">
      <h1 class="fw-bold">Gerenciador de Leituras</h1>
      <p class="text-muted mb-0">Autores, livros, avaliações e busca</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-body" id="autores-area"
               hx-get="/autores"
               hx-trigger="load">
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body" id="livros-area"
               hx-get="/livros"
               hx-trigger="load">
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
